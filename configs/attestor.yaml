# ─────────────────────────────────────────────────────────────────────────
# Attestor — single source of truth for the default stack.
#
# Every smoke runner, deploy script, and Terraform module reads from
# THIS FILE. Nothing else should hardcode a model name, registry
# address, embedder, or DB URL. If you need a different stack for a
# one-off run, copy this file and pass `--config <copy>.yaml` to
# whatever script — don't introduce a second hardcoded default
# anywhere in code.
#
# Stack scope: PG (document) + Pinecone (vector) + Neo4j (graph).
# Other backends remain in code as optional / unpromoted.
# ─────────────────────────────────────────────────────────────────────────

stack:

  # ─── Data plane ──────────────────────────────────────────────────────
  # Postgres holds the DOCUMENT role only (source of truth). The VECTOR
  # role goes to Pinecone (block below) and the GRAPH role to Neo4j.
  # Vector dim must match `embedder.dimensions` below. To revert to the
  # legacy single-Postgres bundle (doc + pgvector in one DB), comment
  # out the `pinecone:` block — `build_backend_config` then uses the
  # `pgvector` registry entry which claims both roles.
  postgres:
    url: postgresql://postgres:attestor@localhost:5432/attestor_v4_test
    v4: true
    skip_schema_init: true   # consumer harnesses reapply schema themselves

  # Pinecone holds the VECTOR role. Two deployment modes:
  #   - Pinecone Local Docker → set host=http://localhost:5080 (no rate
  #     limit, no cloud round-trip; image at ghcr.io/pinecone-io/pinecone-local)
  #   - Pinecone Cloud → omit `host` (use SDK default routing) and set
  #     PINECONE_API_KEY in the environment.
  # Index is auto-created on first write if missing. Comment out this
  # whole block to fall back to pgvector for the vector role.
  pinecone:
    host: http://localhost:5080            # Pinecone Local Docker
    api_key_env: PINECONE_API_KEY
    index_name: attestor
    metric: cosine
    cloud: aws
    region: us-east-1

  # Neo4j holds the GRAPH role (entity nodes + typed edges, PageRank, BFS,
  # Leiden via the GDS plugin). The orchestrator uses it for hop-N
  # affinity-map expansion in the retrieval pipeline.
  neo4j:
    url: bolt://localhost:7687
    auth:
      username: neo4j
      password_env: NEO4J_PASSWORD     # resolved from environment
    database: neo4j

  # ─── Embedder ────────────────────────────────────────────────────────
  # Pinecone Inference llama-text-embed-v2 (NVIDIA-hosted, natively
  # 1024-D — matches the pgvector schema and the Pinecone index dim
  # without the `dimensions=` truncation other backends need).
  # Free tier covers 5M tokens / month; check app.pinecone.io for
  # current limit. Pairs naturally with the Pinecone vector store
  # above so the embedder + index live in the same provider.
  #
  # Alternatives (flip `provider`):
  #   - openai   — text-embedding-3-small @ 1024-D (cheap, paid).
  #                Set OPENAI_API_KEY; requires `dimensions: 1024`.
  #   - openai   — text-embedding-3-large @ 1024-D (best quality, ~6x cost).
  #   - voyage   — voyage-4, 1024-D (Anthropic recommended; paid).
  #                Set VOYAGE_API_KEY.
  #   - ollama   — bge-m3, 1024-D (local, free; needs Ollama daemon).
  embedder:
    provider: pinecone
    model: llama-text-embed-v2
    dimensions: 1024
    api_key_env: PINECONE_API_KEY      # resolved from environment

  # ─── LLM client routing ───────────────────────────────────────────────
  # Where chat-completion calls land. Multi-provider mode: route by
  # model prefix (split on the first `/`).
  #
  #   model: openai/gpt-5.5                → openai provider (direct)
  #   model: openrouter/anthropic/claude-… → openrouter provider
  #                                          (suffix becomes the OR model id)
  #   model: anthropic/claude-sonnet-4-6   → anthropic provider (org proxy)
  #   model: gpt-5.5                       → default_provider
  #
  # Each provider entry sets `base_url` (an OpenAI-compatible endpoint)
  # and `api_key_env` (the env var holding the API key). The runtime
  # helper `_get_client` honors `LME_LLM_BASE_URL` env first when set,
  # so ad-hoc local runs (e.g. local Ollama) work without editing
  # this file.
  llm:
    # Legacy single-provider mode — used when `providers:` is absent or
    # empty. Kept for back-compat with older configs.
    provider: openai

    providers:
      openai:
        base_url: https://api.openai.com/v1
        api_key_env: OPENAI_API_KEY

      # OpenRouter — multi-vendor catalog. Useful when an OpenAI key
      # isn't available, or to mix OpenAI / Anthropic / Mistral / etc.
      # in one credit pool. Uses `vendor/model` ids on the wire (e.g.
      # `anthropic/claude-sonnet-4-6`), which means the YAML model
      # string here is `openrouter/<vendor>/<model>` — the pool strips
      # the `openrouter/` prefix and passes the rest to the API.
      openrouter:
        base_url: https://openrouter.ai/api/v1
        api_key_env: OPENROUTER_API_KEY

      # Anthropic direct via the OpenAI-compatibility endpoint. Anthropic
      # ships an `/v1/chat/completions` shim at api.anthropic.com that
      # accepts OpenAI-style payloads; the pool's OpenAI client speaks
      # to it without an intermediate proxy. Caveats: a few advanced
      # params (e.g. some reasoning_effort settings, prompt-caching
      # cache_control blocks) aren't supported on the compat shim — if
      # you need those, swap this entry to a local LiteLLM proxy.
      anthropic:
        base_url: https://api.anthropic.com/v1/
        api_key_env: ANTHROPIC_API_KEY

    default_provider: openai

  # ─── Models (per-role assignment) ────────────────────────────────────
  models:
    # Answerer — synthesises the final reply from retrieved context.
    answerer: openai/gpt-5.5

    # Judge — single-judge accuracy verdict.
    judge: openai/gpt-5.5

    # Extraction / distillation — runs once per turn during ingest to
    # pull explicit facts out of the conversation.
    extraction: openai/gpt-5.5
    distill:    openai/gpt-5.5

    # Verifier — second-pass cross-check after Judge. Anthropic
    # complements OpenAI for cross-model validation.
    verifier: anthropic/claude-sonnet-4-6

    # Planner — query rewriting + multi-step query decomposition.
    # Used by attestor.retrieval.planner.
    planner: anthropic/claude-opus-4.7

    # Generic CLI default — used when an ad-hoc command (e.g.
    # `attestor locomo`) is invoked without an explicit `--model` flag
    # and no specific role applies.
    benchmark_default: openai/gpt-5.5

    # ─── Reasoning effort (gpt-5.x reasoning-model param) ──────────────
    # Higher effort = more internal CoT tokens spent before the visible
    # answer. Anthropic models silently ignore this param.
    reasoning_effort:
      answerer:    high
      judge:       high
      extraction:  low
      distill:     low
      verifier:    medium
      planner:     medium
      benchmark_default: low

    # ─── Output budget per role (32k uniform cap) ───────────────────────
    # max_tokens is a CAP not a TARGET — the model only generates what
    # it needs and is billed only for what it generates. 32k gives
    # reasoning_effort:high ample headroom without truncating mid-answer.
    max_tokens:
      answerer:    32000
      judge:       32000
      extraction:  32000
      distill:     32000
      verifier:    32000
      planner:     32000
      benchmark_default: 32000

  # ─── Retrieval cascade tuning ─────────────────────────────────────────
  # Three knobs that interact — raising one without the others usually
  # does nothing.
  #
  #   vector_top_k  pgvector LIMIT on the cosine-similarity lane.
  #                 More candidates → more raw material for graph
  #                 affinity + MMR to choose from.
  #
  #   mmr_top_n     post-MMR cap. None means "no cap" (legacy behavior;
  #                 mmr_rerank's diversity trim decides). Set when you
  #                 want to bound how many memories actually reach the
  #                 answerer.
  #
  #   budget        token cap on the final pack (below). At budget=4000
  #                 with 10 memories surviving MMR, MMR is the binding
  #                 constraint, not budget. Set them together.
  retrieval:
    vector_top_k: 50
    # mmr_top_n: 50    # uncomment to cap; default = no cap

    # Multi-query lane. When enabled, the orchestrator rewrites the
    # question into N paraphrases via a single LLM call and RRF-merges
    # N+1 vector searches before the rest of the cascade.
    multi_query:
      enabled: false
      n: 3
      rewriter_model: null               # null → models.extraction
      rewriter_reasoning_effort: low
      merge: rrf                         # rrf | union

    # Temporal pre-filter. When enabled, detects relative time phrases
    # ("two weeks ago", "yesterday", "last Monday") in the question and
    # tightens the vector + BM25 candidate window to memories with
    # event_date within tolerance_days of the implied target.
    # Caller-supplied time_window always wins; this only fires when no
    # explicit bound was passed.
    temporal_prefilter:
      enabled: true
      tolerance_days: 3

    # HyDE v2 — Hypothetical Document Embedding. When enabled,
    # generates a hypothetical 1-2-sentence answer to the question via
    # a small LLM and runs THAT through the vector lane in parallel
    # with the original question. RRF-merges the two ranked lists.
    # Mutually exclusive with multi_query — if both are on,
    # multi_query wins (logged warning).
    hyde:
      enabled: true
      generator_model: null              # null → models.extraction
      generator_reasoning_effort: low
      merge: rrf                         # rrf | union

  budget: 4000   # tokens for the pack sent to the answerer

  # Concurrency for bulk operations across samples.
  parallel: 16

  # Self-consistency answerer. When enabled, the answerer draws K
  # independent samples at non-zero temperature and elects the
  # consensus answer (most-frequent normalized fingerprint by default;
  # optional judge_pick mode delegates to a judge LLM). 5x answerer
  # cost — gate behind this YAML knob.
  self_consistency:
    enabled: false
    k: 5
    temperature: 0.7
    voter: majority           # majority | judge_pick
    judge_model: null         # null → models.judge

  # Critique-and-revise. When enabled, the answerer runs a three-step
  # pipeline:
  #   1. Initial answer (existing path)
  #   2. Critic LLM checks the answer against retrieved context
  #   3. If critic says revise, a second answerer call produces the
  #      corrected answer.
  # ~3x answerer cost. Mutually exclusive with self_consistency
  # (if both are on, self_consistency wins; warning logged).
  critique_revise:
    enabled: false
    critic_model: null            # null → models.verifier
    revise_model: null            # null → models.answerer
    max_revisions: 1              # hard cap; values > 1 rejected

# ─── Container image (for cloud deploys) ────────────────────────────────
# The published image is currently the *introspection-only* MCP stub
# (Glama listing). For Path B cloud deploys we build a separate
# `attestor:api-<version>` image with `attestor api` as the entrypoint
# and push to all 5 public registries below. Each cloud pulls from its
# native registry to minimize cross-cloud egress and pull latency.
image:
  ref: ghcr.io/bolnet/attestor:latest    # default for local docker-compose
  api_ref_template: "ghcr.io/bolnet/attestor:api-{version}"

  # Native registry mirror per cloud. When deploying to a given cloud,
  # use that cloud's mirror — same digest, no cross-cloud pull cost.
  registries:
    ghcr:        ghcr.io/bolnet/attestor
    dockerhub:   bolnet2025/attestor
    quay:        quay.io/bolnet/attestor
    aws_ecr:     public.ecr.aws/m6h5j7o3/attestor
    gcp_ar:      us-central1-docker.pkg.dev/coral-marker-452616-n4/attestor/attestor
    azure_acr:   memwright.azurecr.io/attestor   # private — use `az acr import` to mirror

# ─── Cloud deploy targets ──────────────────────────────────────────────
# Default deploy plan per cloud. PG + Neo4j only — multi-backend code
# paths (Arango/Cosmos/Neptune/AlloyDB-AGE) stay in the repo as optional
# but are NOT featured here.
clouds:

  gcp:
    region: us-central1
    compute: cloud_run
    postgres: cloud_sql              # or "neon" for shared free tier
    neo4j:    auradb                 # AuraDB Free, 1 instance
    image_ref_key: gcp_ar

  azure:
    region: eastus
    compute: container_apps
    postgres: azure_postgres_flex    # or "neon"
    neo4j:    auradb
    image_ref_key: azure_acr

  aws:
    region: us-east-1
    compute: app_runner
    postgres: rds_postgres           # or "neon"
    neo4j:    auradb                 # or self-hosted on EC2
    image_ref_key: aws_ecr
