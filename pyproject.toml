[project]
name = "memwright"
version = "2.0.5"
description = "Production-grade memory infrastructure for multi-agent systems. Namespace isolation, RBAC, provenance, ranked retrieval."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10,<4.0"
authors = [{ name = "aarjay" }]
keywords = ["ai", "agent", "memory", "multi-agent", "llm", "rbac", "namespace", "provenance", "sqlite", "chromadb", "networkx", "graph", "pgvector", "arangodb", "mcp", "agentic"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "chromadb>=0.4.0",
    "networkx>=3.0",
    "sentence-transformers>=2.0.0",
    "mcp>=1.0.0",
]

[project.urls]
Homepage = "https://github.com/bolnet/agent-memory"
Repository = "https://github.com/bolnet/agent-memory"
Issues = "https://github.com/bolnet/agent-memory/issues"

[project.optional-dependencies]
extraction = ["openai>=1.0.0"]
arangodb = []
postgres = ["psycopg2-binary>=2.9.0"]
aws = ["boto3>=1.28.0"]
azure = ["azure-cosmos>=4.5.0", "azure-identity>=1.14.0", "azure-search-documents>=11.4.0"]
gcp = ["google-cloud-firestore>=2.11.0", "google-cloud-aiplatform>=1.38.0"]
cloud-embeddings = ["openai>=1.0.0"]
lambda = ["mangum>=0.17.0", "starlette>=0.27.0"]
all = [
    "openai>=1.0.0",
    "psycopg2-binary>=2.9.0",
    "boto3>=1.28.0",
    "azure-cosmos>=4.5.0",
    "azure-identity>=1.14.0",
    "azure-search-documents>=11.4.0",
    "google-cloud-firestore>=2.11.0",
    "google-cloud-aiplatform>=1.38.0",
]

[project.scripts]
agent-memory = "agent_memory.cli:main"
memwright = "agent_memory.cli:main"

[tool.poetry]
packages = [{ include = "agent_memory" }]

[tool.poetry.group.dev.dependencies]
pytest = ">=7.0"
pytest-cov = ">=4.0"
requests = ">=2.28.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "docker: tests requiring Docker (deselect with '-m not docker')",
]
