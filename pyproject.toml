[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "memwright"
version = "2.0.1"
description = "Zero-config embedded memory for AI agents. SQLite + ChromaDB + NetworkX. No Docker, no API keys."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.9"
authors = [{ name = "aarjay" }]
keywords = ["ai", "agent", "memory", "llm", "sqlite", "chromadb", "networkx", "graph", "embedded", "zero-config", "mcp", "claude-code", "plugin"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "chromadb>=0.4.0",
    "networkx>=3.0",
    "sentence-transformers>=2.0.0",
    "mcp>=1.0.0",
]

[project.urls]
Homepage = "https://github.com/bolnet/agent-memory"
Repository = "https://github.com/bolnet/agent-memory"
Issues = "https://github.com/bolnet/agent-memory/issues"

[project.optional-dependencies]
extraction = ["openai>=1.0.0"]
arangodb = ["python-arango>=8.0.0"]
dev = ["pytest>=7.0", "pytest-cov>=4.0"]
all = ["openai>=1.0.0", "python-arango>=8.0.0"]

[project.scripts]
agent-memory = "agent_memory.cli:main"
memwright = "agent_memory.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["agent_memory"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "docker: tests requiring Docker (deselect with '-m not docker')",
]
