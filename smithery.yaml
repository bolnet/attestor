# Smithery.ai configuration for memwright
# Note: Smithery deployment requires a Dockerfile.
# For local use, install via: poetry add memwright
# Then run: agent-memory serve ./memory-store

runtime: container
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - storePath
    properties:
      storePath:
        type: string
        description: "Path to the memory store directory"
        default: "/data/memory"
      pgConnectionString:
        type: string
        description: "PostgreSQL connection string for pgvector"
        default: "postgresql://memwright:memwright@localhost:5432/memwright"
      neo4jPassword:
        type: string
        description: "Neo4j password"
        default: "memwright"
      openrouterApiKey:
        type: string
        description: "OpenRouter API key for embeddings"
      openaiApiKey:
        type: string
        description: "OpenAI API key for embeddings (alternative to OpenRouter)"
  commandFunction: |
    (config) => ({
      command: "agent-memory",
      args: ["serve", config.storePath || "/data/memory"],
      env: {
        PG_CONNECTION_STRING: config.pgConnectionString || "",
        NEO4J_PASSWORD: config.neo4jPassword || "",
        OPENROUTER_API_KEY: config.openrouterApiKey || "",
        OPENAI_API_KEY: config.openaiApiKey || ""
      }
    })
build:
  dockerfile: Dockerfile
  dockerBuildPath: .
