# Local dev mirror of the AWS ECS deployment.
# Usage: docker compose up --build

services:
  arangodb:
    image: arangodb:3.12
    ports:
      - "8529:8529"
    environment:
      ARANGO_NO_AUTH: "1"
    volumes:
      - arangodb_data:/var/lib/arangodb3
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8529/_api/version || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  attestor:
    build:
      context: ../../..
      dockerfile: attestor/infra/aws_arango/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ARANGO_URL: http://arangodb:8529
      ARANGO_DATABASE: attestor
      ARANGO_PASSWORD: ""
      ARANGO_TLS_VERIFY: "false"
      ATTESTOR_DATA_DIR: /data/attestor
    depends_on:
      arangodb:
        condition: service_healthy

volumes:
  arangodb_data:
