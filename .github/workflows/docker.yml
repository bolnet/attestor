name: Build & Push Docker Image

# Multi-arch (amd64 + arm64) container build that publishes BOTH:
#
#   1. ./Dockerfile         — introspection-only MCP image, the artifact
#                             external registries (Glama, Smithery) verify.
#                             Pushed with the canonical version tags
#                             (e.g. 4.0.0a5, latest, v4).
#   2. ./Dockerfile.api     — full HTTP API image, the artifact cloud
#                             deploys actually pull. Pushed with `api-`
#                             prefixed tags (e.g. api-4.0.0a5, api-latest).
#
# Targets GHCR + Docker Hub + Quay (when the relevant secrets are set —
# missing secrets are skipped gracefully). Manual pushes to AWS ECR
# Public + GCP Artifact Registry + Azure ACR are no longer needed once
# this workflow runs on a release.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  # Docker Hub namespace owned by the maintainer (bolnet2025 on Docker Hub
  # because GitHub username `bolnet` was already taken there). Override
  # by setting DOCKERHUB_USERNAME repository secret.
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || 'bolnet2025' }}
  # Quay.io namespace + image. Quay supports the same `bolnet` namespace
  # as GitHub — pushes go through robot account `bolnet+pusher`.
  QUAY_IMAGE: quay.io/bolnet/attestor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        id: dockerhub_login
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Quay.io
        id: quay_login
        if: github.event_name != 'pull_request' && env.QUAY_USERNAME != '' && env.QUAY_TOKEN != ''
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Compute image list
        id: image_list
        # Build the image list dynamically so empty entries don't end up
        # in the YAML. metadata-action treats empty lines as "use only the
        # first image" — that's why prior releases only pushed
        # ghcr.io/...:latest. This step assembles a clean newline-
        # separated list with no blanks.
        run: |
          {
            echo 'images<<EOF'
            echo '${{ env.GHCR_IMAGE }}'
            if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo 'docker.io/${{ env.DOCKERHUB_NAMESPACE }}/attestor'
            fi
            if [ -n "${{ secrets.QUAY_TOKEN }}" ]; then
              echo '${{ env.QUAY_IMAGE }}'
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata — MCP introspection image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_list.outputs.images }}
          # type=semver only fires when github.ref starts with refs/tags/v*
          # — release events satisfy this since the tag IS the ref. The
          # version coming out is the tag minus the "v" prefix (e.g.
          # v4.0.0a5 → 4.0.0a5). Force the strip via match patterns so
          # alpha/pre-release versions don't get filtered.
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Extract metadata — full API image
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_list.outputs.images }}
          # The api image gets `api-` prefixed tags so it can coexist with
          # the introspection image in the same repo without collision.
          # docs/install/{aws,gcp,azure}.md and configs/attestor.yaml's
          # `image.api_ref_template` both reference :api-<version>.
          tags: |
            type=semver,pattern=api-{{version}}
            type=semver,pattern=api-{{major}}.{{minor}}
            type=sha,format=short,prefix=api-sha-
            type=raw,value=api-latest,enable={{is_default_branch}}
            type=raw,value=api-latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push — MCP introspection image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp

      - name: Build and push — full API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          # API image is currently amd64-only. The published Dockerfile.api
          # uses pinned wheels that ship for amd64; arm64 multi-arch is a
          # follow-up (matches the linux/amd64 caveat in docs/install/).
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
