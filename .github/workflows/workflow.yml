name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-attestor:
    name: Build attestor distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Build package
        run: poetry build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-attestor
          path: dist/

  publish-attestor:
    name: Publish attestor to PyPI
    needs: build-attestor
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download attestor distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-attestor
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
